<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="120">
<title>World Cup 26 — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a14;
    --card: #14141f;
    --card2: #1a1a28;
    --border: #26263a;
    --text: #f2f2f7;
    --muted: #8e8ea3;
    --red: #ff2d55;
    --pink: #ff2d78;
    --purple: #a855f7;
    --blue: #3b82f6;
    --cyan: #22d3ee;
    --green: #34d399;
    --gold: #fbbf24;
    --silver: #cbd5e1;
    --bronze: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Archivo', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---------- animated backdrop ---------- */
  .glow {
    position: fixed; border-radius: 50%; filter: blur(120px);
    opacity: .22; pointer-events: none; z-index: 0;
    animation: drift 18s ease-in-out infinite alternate;
  }
  .glow.g1 { width: 520px; height: 520px; background: var(--purple); top: -180px; left: -120px; }
  .glow.g2 { width: 460px; height: 460px; background: var(--blue); top: 30%; right: -160px; animation-delay: -6s; }
  .glow.g3 { width: 420px; height: 420px; background: var(--pink); bottom: -140px; left: 25%; animation-delay: -12s; }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(60px,40px) scale(1.15); }
  }

  /* ---------- header ---------- */
  header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 56px 16px 28px;
  }
  .ribbon {
    height: 6px; width: 100%;
    position: fixed; top: 0; left: 0; z-index: 10;
    background: linear-gradient(90deg, var(--red), var(--pink), var(--purple), var(--blue), var(--cyan), var(--green), var(--red));
    background-size: 300% 100%;
    animation: ribbonSlide 8s linear infinite;
  }
  @keyframes ribbonSlide { to { background-position: 300% 0; } }

  .kicker {
    font-weight: 800; letter-spacing: .35em; font-size: .72rem;
    color: var(--muted); text-transform: uppercase; margin-bottom: 10px;
  }
  h1 {
    font-family: 'Archivo Black', 'Archivo', sans-serif;
    font-size: clamp(2.6rem, 9vw, 5.2rem);
    line-height: .95; text-transform: uppercase; letter-spacing: -0.01em;
  }
  h1 .wc { display: block; }
  h1 .lb {
    display: block;
    background: linear-gradient(90deg, var(--pink), var(--purple), var(--blue), var(--cyan), var(--green));
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    animation: hueSlide 6s ease-in-out infinite alternate;
  }
  @keyframes hueSlide { from { background-position: 0% 0; } to { background-position: 100% 0; } }
  .updated {
    margin-top: 14px; font-size: .8rem; color: var(--muted); font-weight: 600;
  }
  .updated .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); margin-right: 7px;
    box-shadow: 0 0 0 0 rgba(52,211,153,.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(52,211,153,.55); }
    70% { box-shadow: 0 0 0 9px rgba(52,211,153,0); }
    100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
  }

  main { position: relative; z-index: 1; max-width: 980px; margin: 0 auto; padding: 0 16px 80px; }

  /* ---------- podium ---------- */
  .podium {
    display: grid; grid-template-columns: 1fr 1.15fr 1fr;
    gap: 14px; align-items: end; margin: 26px 0 30px;
  }
  .pod {
    background: linear-gradient(180deg, var(--card2), var(--card));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px 14px 18px;
    text-align: center;
    position: relative; overflow: hidden;
    opacity: 0; transform: translateY(24px);
    animation: rise .6s cubic-bezier(.2,.7,.3,1) forwards;
  }
  .pod::before {
    content: ''; position: absolute; inset: 0 0 auto 0; height: 4px;
  }
  .pod.p1 { animation-delay: .05s; padding-top: 30px; padding-bottom: 28px;
    box-shadow: 0 18px 60px -18px rgba(251,191,36,.35); border-color: rgba(251,191,36,.4); }
  .pod.p1::before { background: linear-gradient(90deg, var(--gold), #fde68a); }
  .pod.p2 { animation-delay: .15s; }
  .pod.p2::before { background: linear-gradient(90deg, var(--silver), #f8fafc); }
  .pod.p3 { animation-delay: .25s; }
  .pod.p3::before { background: linear-gradient(90deg, var(--bronze), #fcd34d); }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .pod .medal { font-size: 2rem; }
  .pod.p1 .medal { font-size: 2.6rem; animation: bob 3s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .pod .pname {
    font-weight: 800; font-size: 1rem; margin-top: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pod.p1 .pname { font-size: 1.15rem; }
  .pod .ppts {
    font-family: 'Archivo Black', sans-serif; font-size: 1.7rem; margin-top: 4px;
  }
  .pod.p1 .ppts { font-size: 2.2rem; color: var(--gold); }
  .pod.p2 .ppts { color: var(--silver); }
  .pod.p3 .ppts { color: var(--bronze); }
  .pod .plabel { font-size: .65rem; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
  .pod .pmove { margin-top: 8px; }

  /* ---------- table card ---------- */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 30px 80px -30px rgba(0,0,0,.8);
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 14px 12px; font-size: .68rem; font-weight: 800;
    letter-spacing: .14em; text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.02);
    text-align: center;
  }
  thead th.left { text-align: left; }
  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,.045);
    opacity: 0; transform: translateX(-14px);
    animation: slidein .45s cubic-bezier(.2,.7,.3,1) forwards;
    transition: background .15s;
  }
  tbody tr:hover { background: rgba(255,255,255,.035); }
  tbody tr:last-child { border-bottom: none; }
  @keyframes slidein { to { opacity: 1; transform: translateX(0); } }

  td { padding: 12px; text-align: center; font-size: .9rem; }
  td.rank {
    font-family: 'Archivo Black', sans-serif; font-size: 1rem; width: 52px; color: var(--muted);
  }
  tr.r1 td.rank { color: var(--gold); }
  tr.r2 td.rank { color: var(--silver); }
  tr.r3 td.rank { color: var(--bronze); }
  td.name { text-align: left; font-weight: 700; font-size: .95rem; white-space: nowrap; }
  td.cat { color: #c8c8d8; font-weight: 600; font-variant-numeric: tabular-nums; }
  td.move { width: 70px; }

  /* movement chips */
  .chip {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: .72rem; font-weight: 800; letter-spacing: .02em;
    padding: 3px 9px; border-radius: 999px;
    font-variant-numeric: tabular-nums;
  }
  .chip.up   { color: var(--green); background: rgba(52,211,153,.12); box-shadow: 0 0 14px -2px rgba(52,211,153,.35); }
  .chip.down { color: var(--red);   background: rgba(255,45,85,.12);  box-shadow: 0 0 14px -2px rgba(255,45,85,.3); }
  .chip.same { color: var(--muted); background: rgba(255,255,255,.05); }
  .chip.new  { color: var(--purple); background: rgba(168,85,247,.14); }
  .chip.up .arr { animation: nudgeUp 1.6s ease-in-out infinite; }
  .chip.down .arr { animation: nudgeDown 1.6s ease-in-out infinite; }
  @keyframes nudgeUp { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
  @keyframes nudgeDown { 0%,100% { transform: translateY(0); } 50% { transform: translateY(2px); } }

  /* total + bar */
  td.total { width: 150px; }
  .totwrap { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; padding-right: 4px; }
  .totnum {
    font-family: 'Archivo Black', sans-serif; font-size: 1.05rem; line-height: 1;
    background: linear-gradient(90deg, var(--cyan), var(--blue));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  tr.r1 .totnum { background: linear-gradient(90deg, var(--gold), #fde68a);
    -webkit-background-clip: text; background-clip: text; }
  .bar {
    width: 110px; height: 5px; border-radius: 3px;
    background: rgba(255,255,255,.07); overflow: hidden;
  }
  .bar i {
    display: block; height: 100%; width: 0;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--pink), var(--purple), var(--blue), var(--cyan));
    transition: width 1.1s cubic-bezier(.2,.7,.3,1);
  }
  tr.r1 .bar i { background: linear-gradient(90deg, var(--gold), #fde68a); }

  /* sparkline */
  td.spark { width: 76px; }
  td.spark svg { display: block; margin: 0 auto; opacity: .85; }

  /* legend */
  .key {
    margin-top: 18px; display: flex; flex-wrap: wrap; gap: 8px 22px;
    justify-content: center; font-size: .73rem; color: var(--muted); font-weight: 600;
  }
  .key b { color: #c8c8d8; }

  footer {
    margin-top: 34px; text-align: center; font-size: .7rem; color: #55556a;
    letter-spacing: .1em; text-transform: uppercase; font-weight: 700;
  }

  /* ---------- responsive ---------- */
  @media (max-width: 720px) {
    td.cat, th.cat, td.spark, th.spark { display: none; }
    td.total { width: 96px; }
    .bar { width: 64px; }
    td, thead th { padding: 11px 8px; }
    .podium { gap: 8px; }
    .pod .pname { font-size: .82rem; }
    .pod.p1 .pname { font-size: .95rem; }
    .pod .ppts { font-size: 1.3rem; }
    .pod.p1 .ppts { font-size: 1.7rem; }
  }
</style>
</head>
<body>

<div class="ribbon"></div>
<div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div>

<header>
  <p class="kicker">United 2026 &middot; Predictor Competition</p>
  <h1><span class="wc">World Cup 26</span><span class="lb">Leaderboard</span></h1>
  <p class="updated"><span class="dot"></span>Last updated: <span id="updated"></span></p>
</header>

<main>
  <div class="podium" id="podium"></div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Move</th>
          <th class="left">Player</th>
          <th class="cat">Group</th>
          <th class="cat">1st/2nd</th>
          <th class="cat">Bracket</th>
          <th class="cat">Boot/Glove</th>
          <th class="spark">Form</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="key">
    <span>&#128203; <b>Group</b> = group-stage pts</span>
    <span>&#127941; <b>1st/2nd</b> = group winners pts</span>
    <span>&#127919; <b>Bracket</b> = knockout predictions</span>
    <span>&#128095; <b>Boot/Glove</b> = top scorer &amp; keeper</span>
    <span>&#128200; <b>Form</b> = rank over recent updates</span>
  </div>

  <footer id="footer"></footer>
</main>

<script>
const DATA = {"players": [{"rank": 1, "name": "Aidan", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Aline", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Ally", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Becky", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Carol", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Dawn", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Fiona", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 0}, {"rank": 1, "name": "George", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Jake", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Josie", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Julie", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Lauren Smith", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Libby", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Megan", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Mikey", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Rachel", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Sibin", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Sujata", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 21}, {"rank": 1, "name": "Tina", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Toby", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Tommy", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}, {"rank": 1, "name": "Yaz", "group": 0, "firstsecond": 0, "bracket": 0, "bootglove": 0, "total": 0, "delta": 1}], "rankSeries": {"Aidan": [1, 1, 6, 1, 2, 1], "Aline Gallan": [1], "Ally Mac": [1], "Becky Hawkins": [1], "Carol": [1, 1, 6, 1, 2, 1], "Dawn": [1, 1, 6, 1, 2, 1], "Fiona Humphrys": [1], "George": [1, 1, 6, 1, 2, 1], "Jake": [1, 1, 6, 1, 2, 1], "Josie": [1, 1, 1, 1, 2, 1], "Julie": [1, 1, 6, 1, 2, 1], "Lauren Smith": [1, 1, 6, 1, 2, 1], "Libby": [1, 1, 6, 1, 2, 1], "Megan": [1, 1, 6, 1, 2, 1], "Mikey": [1, 1, 1, 1, 2, 1], "Rachel": [1, 1, 6, 1, 2, 1], "Sibin Vilasan": [1], "Sujata": [1, 1, 22, 1, 22, 1], "Tina Surman": [1], "Toby": [1, 1, 6, 1, 2, 1], "Tommy": [1, 1, 6, 1, 2, 1], "Yaz": [1, 1, 1, 1, 2, 1], "Aline": [1, 1, 1, 2, 1], "Ally": [1, 6, 1, 2, 1], "Becky": [1, 6, 1, 2, 1], "Fiona": [1, 6, 1, 1, 1], "Sibin": [1, 6, 1, 2, 1], "Tina": [1, 1, 1, 2, 1]}, "updated": "11 June 2026, 12:52", "nPlayers": 22};

function chip(delta) {
  if (delta === null || delta === undefined) return '<span class="chip new">NEW</span>';
  if (delta > 0)  return '<span class="chip up"><span class="arr">&#9650;</span>' + delta + '</span>';
  if (delta < 0)  return '<span class="chip down"><span class="arr">&#9660;</span>' + Math.abs(delta) + '</span>';
  return '<span class="chip same">&ndash;</span>';
}

function medal(rank) {
  return rank === 1 ? '&#129351;' : rank === 2 ? '&#129352;' : rank === 3 ? '&#129353;' : rank;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sparkline(series, nPlayers) {
  if (!series || series.length < 2) return '<svg width="60" height="20"></svg>';
  const w = 60, h = 18, pad = 2;
  const n = series.length;
  const x = i => pad + i * (w - 2*pad) / (n - 1);
  // rank 1 at top
  const y = r => pad + (r - 1) * (h - 2*pad) / Math.max(1, nPlayers - 1);
  const pts = series.map((r, i) => x(i).toFixed(1) + ',' + y(r).toFixed(1)).join(' ');
  const lastUp = series[n-1] < series[n-2];
  const lastDown = series[n-1] > series[n-2];
  const col = lastUp ? '#34d399' : lastDown ? '#ff2d55' : '#8e8ea3';
  const end = series[n-1];
  return '<svg width="60" height="20" viewBox="0 0 60 20">' +
    '<polyline points="' + pts + '" fill="none" stroke="' + col + '" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>' +
    '<circle cx="' + x(n-1).toFixed(1) + '" cy="' + y(end).toFixed(1) + '" r="2.2" fill="' + col + '"/>' +
    '</svg>';
}

function render() {
  const p = DATA.players;
  document.getElementById('updated').textContent = DATA.updated;
  document.getElementById('footer').textContent =
    p.length + ' players · may the best predictor win';

  // podium (order: 2nd, 1st, 3rd)
  const top3 = p.slice(0, 3);
  if (top3.length === 3) {
    const order = [[top3[1],'p2'], [top3[0],'p1'], [top3[2],'p3']];
    const medals = {p1:'&#129351;', p2:'&#129352;', p3:'&#129353;'};
    document.getElementById('podium').innerHTML = order.map(([pl, cls]) =>
      '<div class="pod ' + cls + '">' +
        '<div class="medal">' + medals[cls] + '</div>' +
        '<div class="pname">' + esc(pl.name) + '</div>' +
        '<div class="ppts">' + pl.total + '</div>' +
        '<div class="plabel">points</div>' +
        '<div class="pmove">' + chip(pl.delta) + '</div>' +
      '</div>').join('');
  }

  // table
  const maxTotal = Math.max(1, ...p.map(r => r.total));
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = p.map((r, i) => {
    const rcls = r.rank <= 3 ? ' class="r' + r.rank + '"' : '';
    const series = DATA.rankSeries[r.name];
    return '<tr' + (rcls ? rcls.replace('class="', 'class="') : '') +
      ' style="animation-delay:' + (0.04 * i + 0.3).toFixed(2) + 's">' +
      '<td class="rank">' + medal(r.rank) + '</td>' +
      '<td class="move">' + chip(r.delta) + '</td>' +
      '<td class="name">' + esc(r.name) + '</td>' +
      '<td class="cat">' + r.group + '</td>' +
      '<td class="cat">' + r.firstsecond + '</td>' +
      '<td class="cat">' + r.bracket + '</td>' +
      '<td class="cat">' + r.bootglove + '</td>' +
      '<td class="spark">' + sparkline(series, DATA.nPlayers) + '</td>' +
      '<td class="total"><div class="totwrap">' +
        '<span class="totnum" data-target="' + r.total + '">0</span>' +
        '<span class="bar"><i data-w="' + (100 * r.total / maxTotal).toFixed(1) + '"></i></span>' +
      '</div></td>' +
    '</tr>';
  }).join('');

  // animate bars + count-up
  requestAnimationFrame(() => {
    document.querySelectorAll('.bar i').forEach(el => {
      setTimeout(() => { el.style.width = el.dataset.w + '%'; }, 350);
    });
    document.querySelectorAll('.totnum').forEach(el => {
      const target = parseInt(el.dataset.target, 10) || 0;
      const dur = 900, t0 = performance.now();
      function tick(t) {
        const k = Math.min(1, (t - t0) / dur);
        el.textContent = Math.round(target * (1 - Math.pow(1 - k, 3)));
        if (k < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    });
  });
}

render();
</script>

</body>
</html>
